apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-replicai
  name: nginx-replicai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-replicai
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx-replicai
    spec:
      containers:
      - image: nginx:1.20
        name: nginx
        resources: {}
status: {}